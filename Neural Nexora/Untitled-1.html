<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPG Studio - Pro Hardware Edition</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --nav-bg: #111827;
            --grid-line: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --accent-pink: #ec4899;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .navbar {
            background-color: var(--nav-bg); height: 60px;
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid #1f2937; justify-content: space-between;
        }

        .brand { font-size: 1.5rem; font-weight: 800; }
        .brand span { color: var(--accent-pink); }

        .controls { display: flex; gap: 10px; }
        
        button {
            color: white; border: none;
            padding: 8px 16px; border-radius: 6px; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 0.95rem;
        }
        
        button:hover { filter: brightness(1.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #btnSerial { background-color: var(--accent-purple); }
        #btnBLE { background-color: var(--accent-blue); }

        .workspace {
            flex: 1; position: relative;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .status-box {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(17, 24, 39, 0.85); padding: 10px 20px;
            border-radius: 10px; font-size: 0.9rem; border: 1px solid #374151;
            font-family: monospace; color: #10b981;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">NPG<span>Studio</span></div>
        <div class="controls">
            <button id="btnSerial">🔌 Connect USB Cable</button>
            <button id="btnBLE">🔵 Connect Bluetooth</button>
        </div>
    </div>

    <div class="workspace" id="workspace">
        <canvas id="eegCanvas"></canvas>
        <div class="status-box" id="statusText">Hardware Value: --<br>Status: Disconnected</div>
    </div>

<script>
    const canvas = document.getElementById('eegCanvas');
    const ctx = canvas.getContext('2d');
    const workspace = document.getElementById('workspace');
    const statusText = document.getElementById('statusText');

    function resize() {
        canvas.width = workspace.clientWidth;
        canvas.height = workspace.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Array to hold exactly 2000 points of real hardware data across the screen
    const MAX_SAMPLES = 2000; 
    const eegData = new Float32Array(MAX_SAMPLES);
    let dataIndex = 0;

    // Master function to ingest real hardware data and update the UI text
    function processRealData(realHardwareValue) {
        eegData[dataIndex] = realHardwareValue;
        dataIndex = (dataIndex + 1) % MAX_SAMPLES;
        
        // Update the bottom-right text box to show the exact raw number
        statusText.innerHTML = `Hardware Value: <b>${realHardwareValue}</b><br>Status: 🟢 Streaming Live`;
    }

    function lockButtons() {
        document.getElementById('btnSerial').disabled = true;
        document.getElementById('btnBLE').disabled = true;
    }

    // ==========================================
    // 🔌 MODE 1: USB CABLE (Requires "Serial" Firmware)
    // ==========================================
    document.getElementById('btnSerial').addEventListener('click', async () => {
        try {
            statusText.innerHTML = "Hardware Value: --<br>Status: 🟡 Requesting USB...";
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 }); 
            
            lockButtons();

            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();
            
            let buffer = "";

            // Listen to the USB cable continuously
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value) {
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line
                    
                    for (let line of lines) {
                        let num = parseInt(line.trim());
                        if (!isNaN(num)) processRealData(num);
                    }
                }
            }
        } catch (error) {
            console.error(error);
            statusText.innerHTML = "Hardware Value: --<br>Status: 🔴 USB Connection Failed";
        }
    });

    // ==========================================
    // 🔵 MODE 2: BLUETOOTH (Requires "Bluetooth LE" Firmware)
    // ==========================================
    document.getElementById('btnBLE').addEventListener('click', async () => {
        try {
            statusText.innerHTML = "Hardware Value: --<br>Status: 🟡 Scanning for NPG...";
            
            const bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: "NPG" }], 
                optionalServices: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"]
            });
            
            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
            
            const dataChar = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
            const controlChar = await service.getCharacteristic("0000ff01-0000-1000-8000-00805f9b34fb");

            await dataChar.startNotifications();
            
            // Listen to the Bluetooth packets
            dataChar.addEventListener('characteristicvaluechanged', (event) => {
                const value = event.target.value;
                for (let i = 0; i < 10; i++) {
                    let offset = i * (value.byteLength / 10);
                    let rawCh1 = value.getUint16(offset + 1, false); 
                    processRealData(rawCh1);
                }
            });

            // WAKE UP COMMAND
            const encoder = new TextEncoder();
            await controlChar.writeValue(encoder.encode("START"));

            lockButtons();
        } catch (error) {
            console.error(error);
            statusText.innerHTML = "Hardware Value: --<br>Status: 🔴 BLE Connection Failed";
        }
    });

    // ==========================================
    // 🎨 GRAPH RENDERING (Accuracy Engine)
    // ==========================================
    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = '#ec4899'; // Neon Pink Line
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round';

        const sliceWidth = canvas.width / MAX_SAMPLES;
        let x = 0;

        for (let i = 0; i < MAX_SAMPLES; i++) {
            let idx = (dataIndex + i) % MAX_SAMPLES;
            let realValue = eegData[idx]; 
            
            // Map the exact 12-bit hardware constraint (0-4095) to the screen
            let y = canvas.height - ((realValue / 4095) * canvas.height);

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);

            x += sliceWidth;
        }
        ctx.stroke();
        requestAnimationFrame(drawGraph);
    }
    drawGraph();

</script>
</body>
</html>
