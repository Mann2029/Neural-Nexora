<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Nexora | AI Focus Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>
    <div class="dashboard-grid">
        <nav class="nav-bar">
            <div class="logo">NEURAL<span>NEXORA</span></div>
            <div class="btn-group">
                <button id="btnConnect" class="btn-primary">PAIR DEVICE</button>
                <button id="btnStart" class="btn-success" disabled>START SESSION</button>
                <button id="btnStop" class="btn-danger" disabled>STOP</button>
                <button id="btnDownload" class="btn-secondary" disabled>EXPORT DATA</button>
            </div>
        </nav>

        <main class="main-content">
            <div class="panel-header">
                <h3>Real-Time EEG Waveform</h3>
                <span id="statusLabel" class="status-badge">Link Ready</span>
            </div>
            <div id="canvasWrapper">
                <canvas id="eegCanvas"></canvas>
            </div>
        </main>

        <aside class="sidebar">
            <section class="metric-card focus-box">
                <h3 class="panel-title">Neural Attention Score</h3>
                <div class="focus-meter">
                    <div id="focusValue">--</div>
                    <div class="sub-label">% ATTENTION</div>
                    <div id="mlStatus" class="ml-status-text">Calibration Required (2m)</div>
                </div>
            </section>

            <section class="metric-card bands-box">
                <h3 class="panel-title">Frequency Analysis</h3>
                <div class="band-row">
                    <label>Alpha (Relaxation State)</label>
                    <div class="progress-bg"><div id="barAlpha" class="progress-fill alpha"></div></div>
                </div>
                <div class="band-row">
                    <label>Beta (Concentration State)</label>
                    <div class="progress-bg"><div id="barBeta" class="progress-fill beta"></div></div>
                </div>
                <div class="band-row">
                    <label>Signal Noise (50Hz Interf.)</label>
                    <div class="progress-bg"><div id="barNoise" class="progress-fill noise"></div></div>
                </div>
                <div class="stats-footer">
                    <span>CHANNELS: <b id="chCount">0</b></span>
                    <span>BATT: <b id="battLevel">--</b></span>
                </div>
            </section>
        </aside>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
